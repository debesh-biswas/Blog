name: Notify subscribers on new post

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog post
        id: new_post
        run: |
          NEW_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/blog/' | head -1)
          if [ -n "$NEW_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            TITLE=$(grep -m1 '^title:' "$NEW_FILE" | sed "s/^title:[[:space:]]*['\"]//;s/['\"][[:space:]]*$//")
            SLUG=$(echo "$NEW_FILE" | sed 's|src/content/blog/||;s|/index\.mdx$||;s|\.mdx$||')
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "New post detected: $TITLE (slug: $SLUG)"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No new blog post in this push."
          fi

      - uses: actions/setup-node@v4
        if: steps.new_post.outputs.found == 'true'
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci
        if: steps.new_post.outputs.found == 'true'

      - name: Send notification emails
        if: steps.new_post.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          NEW_POST_TITLE: ${{ steps.new_post.outputs.title }}
          NEW_POST_SLUG: ${{ steps.new_post.outputs.slug }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/notify-subscribers.mjs
